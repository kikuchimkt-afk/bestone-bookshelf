<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="本のデータベース - Google Drive連携のPDF閲覧アプリ">
  <title>📚 本のデータベース</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ログイン画面 -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-icon">📚</div>
      <h1 class="login-title">本のデータベース</h1>
      <p class="login-subtitle">Google Driveの本棚にアクセス</p>
      <button id="btn-signin" class="btn-signin" onclick="handleSignIn()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Googleでサインイン
      </button>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="app" class="app hidden">
    <!-- ヘッダー -->
    <header class="header">
      <div class="header-top">
        <div class="header-brand">
          <span class="brand-icon">📚</span>
          <h1 class="brand-title">本のデータベース</h1>
        </div>
        <div class="header-actions">
          <div class="user-info" id="user-info"></div>
          <button id="btn-signout" class="btn-signout" onclick="handleSignOut()">サインアウト</button>
        </div>
      </div>
      <div class="header-search">
        <div class="search-container">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="タイトルやタグで検索...">
          <button id="btn-clear-search" class="btn-clear-search hidden" onclick="clearSearch()">✕</button>
        </div>
      </div>
      <div class="header-tags" id="tag-filter-container">
        <div class="tag-chips" id="tag-chips"></div>
      </div>
    </header>

    <!-- ローディング -->
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p class="loading-text">本棚を読み込んでいます...</p>
    </div>

    <!-- 本の数 -->
    <div id="book-count" class="book-count hidden"></div>

    <!-- 本のグリッド -->
    <main id="book-grid" class="book-grid"></main>

    <!-- 空の状態 -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">🔍</div>
      <p class="empty-text">該当する本が見つかりません</p>
    </div>
  </div>

  <!-- PDFモーダル -->
  <div id="pdf-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title"></h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div id="modal-cover" class="modal-cover"></div>
        <div class="modal-section">
          <h3 class="modal-section-title">📄 PDFファイル</h3>
          <ul id="modal-pdf-list" class="modal-pdf-list"></ul>
        </div>
        <div class="modal-section">
          <h3 class="modal-section-title">🏷️ タグ</h3>
          <div class="modal-tags">
            <div id="modal-tags-list" class="modal-tags-list"></div>
            <div class="tag-add-form">
              <input type="text" id="tag-input" class="tag-input" placeholder="新しいタグを追加...">
              <button class="btn-add-tag" onclick="addTag()">追加</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
