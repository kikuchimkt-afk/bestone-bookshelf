<!DOCTYPE html>
<html lang="ja" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="本のデータベース - Google Drive連携のPDF閲覧アプリ">
  <title>📚 本のデータベース</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ログイン画面 -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-icon">📚</div>
      <h1 class="login-title">本のデータベース</h1>
      <p class="login-subtitle">Google Driveの本棚にアクセス</p>
      <button id="btn-signin" class="btn-signin" onclick="handleSignIn()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path
            d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
            fill="#4285F4" />
          <path
            d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"
            fill="#34A853" />
          <path
            d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
            fill="#FBBC05" />
          <path
            d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
            fill="#EA4335" />
        </svg>
        Googleでサインイン
      </button>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="app" class="app hidden">
    <header class="header">
      <div class="header-top">
        <div class="header-brand">
          <span class="brand-icon">📚</span>
          <h1 class="brand-title">本のデータベース</h1>
        </div>
        <div class="header-actions">
          <button id="btn-refresh" class="btn-icon" onclick="refreshBooks()" title="本棚を更新">🔄</button>
          <button id="btn-theme" class="btn-icon" onclick="toggleTheme()" title="テーマ切替">🌙</button>
          <div class="user-info" id="user-info"></div>
          <button id="btn-signout" class="btn-signout" onclick="handleSignOut()">サインアウト</button>
        </div>
      </div>
      <div class="header-search">
        <div class="search-container">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="タイトルやタグで検索...">
          <button id="btn-clear-search" class="btn-clear-search hidden" onclick="clearSearch()">✕</button>
        </div>
      </div>
      <div class="toolbar">
        <div class="toolbar-left">
          <button class="toolbar-btn active" id="btn-all" onclick="setViewMode('all')">📖 すべて</button>
          <button class="toolbar-btn" id="btn-favorites" onclick="setViewMode('favorites')">⭐ お気に入り</button>
          <button class="toolbar-btn" id="btn-recent" onclick="setViewMode('recent')">🕐 最近開いた本</button>
          <button class="toolbar-btn" id="btn-category" onclick="setViewMode('category')">📂 カテゴリ</button>
        </div>
        <div class="toolbar-right">
          <select id="sort-select" class="sort-select" onchange="handleSort()">
            <option value="name-asc">名前 A→Z</option>
            <option value="name-desc">名前 Z→A</option>
            <option value="tags-desc">タグ数 多→少</option>
            <option value="recent">最近開いた順</option>
          </select>
          <button class="btn-icon" id="btn-view-toggle" onclick="toggleViewStyle()" title="表示切替">⊞</button>
          <button class="btn-icon" id="btn-batch-tag" onclick="toggleBatchMode()" title="一括タグ編集">✏️</button>
        </div>
      </div>
      <div class="header-tags" id="tag-filter-container">
        <div class="tag-chips" id="tag-chips"></div>
      </div>
    </header>

    <!-- 一括タグ編集バー -->
    <div id="batch-bar" class="batch-bar hidden">
      <span id="batch-count">0冊 選択中</span>
      <div class="batch-actions">
        <input type="text" id="batch-tag-input" class="tag-input" placeholder="タグを入力...">
        <button class="btn-add-tag" onclick="batchAddTag()">一括追加</button>
        <button class="btn-batch-cancel" onclick="toggleBatchMode()">キャンセル</button>
      </div>
    </div>

    <!-- ローディング -->
    <div id="loading" class="loading hidden">
      <div class="loading-spinner"></div>
      <p class="loading-text">本棚を読み込んでいます...</p>
    </div>

    <!-- リフレッシュ通知 -->
    <div id="refresh-toast" class="refresh-toast hidden">
      <span id="refresh-toast-text"></span>
    </div>

    <div id="book-count" class="book-count hidden"></div>
    <main id="book-grid" class="book-grid"></main>
    <main id="category-container" class="category-container hidden"></main>
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">🔍</div>
      <p class="empty-text">該当する本が見つかりません</p>
    </div>
  </div>

  <!-- PDFモーダル -->
  <div id="pdf-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title"></h2>
        <div class="modal-header-actions">
          <button id="modal-fav-btn" class="btn-icon modal-fav" onclick="toggleFavorite()" title="お気に入り">☆</button>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
      </div>
      <div class="modal-body">
        <div id="modal-cover" class="modal-cover"></div>
        <!-- ファイルブラウザ -->
        <div class="modal-section">
          <div class="file-browser-header">
            <h3 class="modal-section-title">📁 ファイル</h3>
            <div id="breadcrumb" class="breadcrumb"></div>
          </div>
          <div id="file-browser" class="file-browser"></div>
          <div id="file-loading" class="file-loading hidden">
            <div class="loading-spinner small"></div>
            <span>読み込み中...</span>
          </div>
        </div>
        <div class="modal-section">
          <h3 class="modal-section-title">🏷️ タグ</h3>
          <div class="modal-tags">
            <div id="modal-tags-list" class="modal-tags-list"></div>
            <div class="tag-add-form">
              <input type="text" id="tag-input" class="tag-input" placeholder="新しいタグを追加...">
              <button class="btn-add-tag" onclick="addTag()">追加</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>

</html>
